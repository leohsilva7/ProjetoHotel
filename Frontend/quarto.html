<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quartos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
<div id="container"></div>
    <div class="form-container container-fluid d-flex justify-content-center align-items-center h-100 flex-column">
        <form action="#" onsubmit="createQuarto(event)">
            <h1>Crie um Quarto</h1>
            <div class="hotel-select mb-3">
                <label for="select-id" class="form-label">Selecione um Hotel</label>
                <select id="select-id" class="form-select"></select>
            </div>
            <div class="div-tipo mb-3">
                <label for="tipo-id" class="form-label">Tipo: </label>
                <input type="text" name="" id="tipo-id" required class="form-control">
            </div>
            <div class="div-preco mb-3">
                <label for="preco-id" class="form-label">Preço: </label>
                <input type="number" name="" id="preco-id" required class="form-control">
            </div>
            <button type="submit" class="btn btn-primary">Criar</button>
        </form>
    </div>
    <script src="./js/quarto.js"></script>
</body>
</html>
