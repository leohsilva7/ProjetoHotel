<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hoteis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
<div id="container">

</div>
<div class="form-container container-fluid d-flex justify-content-center align-items-center h-100 flex-column">
    <h3>Crie um Hotel!</h3>
    <form action="#" onsubmit="createHotel(event)">
        <div class="div-nome mb-3">
            <label for="name-id" class="form-label">Nome: </label>
            <input type="text" name="" id="name-id" required class="form-control">
        </div>
        <div class="div-cidade mb-3">
            <label for="cidade-id" class="form-labe">Cidade: </label>
            <input type="text" name="" id="cidade-id" required class="form-control">
        </div>
        <div class="div-estrelas mb-3">
            <label for="estrelas-id" class="form-label">Estrelas: </label>
            <input type="number" name="" id="estrelas-id" required class="form-control">
        </div>
        <button type="submit" class="btn btn-primary">Criar Hotel!</button>
    </form>
</div>
<script src="./js/script.js"></script>
</body>
</html>
